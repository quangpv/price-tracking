name: Deploy to VPS

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  setup-vps:
    runs-on: ubuntu-latest
    steps:
      - name: Setup VPS base services
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e

            # Install nginx if not present
            if ! command -v nginx &>/dev/null; then
              sudo apt update && sudo apt install -y nginx
            fi

            # Install certbot if not present
            if ! command -v certbot &>/dev/null; then
              sudo apt update && sudo apt install -y certbot
            fi

            # Get SSL cert if not present
            DOMAIN="${{ secrets.VPS_DOMAIN }}"
            ADMIN_EMAIL="${{ secrets.VPS_ADMIN_EMAIL }}"
            if [ ! -f "/etc/letsencrypt/live/$DOMAIN/fullchain.pem" ]; then
              sudo systemctl stop nginx 2>/dev/null || true
              sudo certbot certonly \
                --standalone \
                --preferred-challenges http \
                -d "$DOMAIN" \
                --non-interactive \
                --agree-tos \
                --email "$ADMIN_EMAIL" \
                --keep-until-expiring
              sudo systemctl start nginx
            fi

            # Setup auto-renewal cron
            if ! sudo crontab -l 2>/dev/null | grep -q "certbot"; then
              (sudo crontab -l 2>/dev/null; echo "0 0 * * * certbot renew --quiet && systemctl reload nginx") | sudo crontab -
            fi

  build-and-deploy:
    needs: setup-vps
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Deploy nginx config to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: "nginx/price-tracking.conf"
          target: "/home/${{ secrets.VPS_USER }}/"
          overwrite: true

      - name: Configure and enable nginx site
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            CONFIG_SRC="/home/${{ secrets.VPS_USER }}/nginx/price-tracking.conf"
            CONFIG_DEST="/etc/nginx/sites-available/price-tracking"

            # Move config to nginx sites-available
            sudo mv "$CONFIG_SRC" "$CONFIG_DEST"

            # Replace placeholders with actual values
            sudo sed -i "s|__DOMAIN__|${{ secrets.VPS_DOMAIN }}|g" "$CONFIG_DEST"
            sudo sed -i "s|__DEPLOY_PATH__|${{ secrets.DEPLOY_PATH }}|g" "$CONFIG_DEST"

            # Enable site
            sudo ln -sf "$CONFIG_DEST" /etc/nginx/sites-enabled/

            # Test and reload
            sudo nginx -t && sudo systemctl reload nginx

      - name: Deploy app to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: "dist/"
          target: ${{ secrets.DEPLOY_PATH }}
          strip_components: 1
          overwrite: true

      - name: Reload Nginx
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: sudo nginx -s reload
