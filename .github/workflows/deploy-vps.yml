name: Deploy to VPS

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  setup-vps:
    runs-on: ubuntu-latest
    steps:
      - name: Setup VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e

            # Install nginx if not present
            if ! command -v nginx &>/dev/null; then
              sudo apt update && sudo apt install -y nginx
            fi

            # Install certbot if not present
            if ! command -v certbot &>/dev/null; then
              sudo apt update && sudo apt install -y certbot
            fi

            # Deploy nginx config (base64 to preserve $variables)
            echo "" | sudo base64 -d | sudo sed "s|__DEPLOY_PATH__|${{ secrets.DEPLOY_PATH }}|g" | sudo tee /etc/nginx/sites-available/price-tracking > /dev/null

            # Enable site
            sudo ln -sf /etc/nginx/sites-available/price-tracking /etc/nginx/sites-enabled/

            # Get SSL cert if not present
            if [ ! -f "/etc/letsencrypt/live/${{ secrets.DOMAIN }}/fullchain.pem" ]; then
              sudo systemctl stop nginx 2>/dev/null || true
              sudo certbot certonly \
                --standalone \
                --preferred-challenges http \
                -d ${{ secrets.DOMAIN }} \
                --non-interactive \
                --agree-tos \
                --email ${{ secrets.ADMIN_EMAIL }} \
                --keep-until-expiring
              sudo systemctl start nginx
            fi

            # Setup auto-renewal cron
            if ! sudo crontab -l 2>/dev/null | grep -q "certbot"; then
              (sudo crontab -l 2>/dev/null; echo "0 0 * * * certbot renew --quiet && systemctl reload nginx") | sudo crontab -
            fi

            # Test and reload
            sudo nginx -t && sudo systemctl reload nginx

  build-and-deploy:
    needs: setup-vps
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Deploy to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: "dist/"
          target: ${{ secrets.DEPLOY_PATH }}
          strip_components: 1
          overwrite: true

      - name: Reload Nginx
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: sudo nginx -s reload
