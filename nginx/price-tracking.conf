# HTTP -> HTTPS redirect
server {
    listen 80;
    server_name quangpv.mooo.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS server
server {
    listen 443 ssl http2;
    server_name quangpv.mooo.com;

    # SSL certificates (after certbot)
    ssl_certificate     /etc/letsencrypt/live/quangpv.mooo.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/quangpv.mooo.com/privkey.pem;

    # SSL hardening
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # App root
    root __DEPLOY_PATH__;
    index index.html;

    # Security headers
    add_header X-Frame-Options SAMEORIGIN;
    add_header X-Content-Type-Options nosniff;
    add_header X-XSS-Protection "1; mode=block";

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;

        # Cache static assets
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
    }

    # Proxy for Binance API
    location /api/binance/ {
        proxy_pass https://api.binance.com/;
        proxy_set_header Host api.binance.com;
        proxy_set_header User-Agent "Mozilla/5.0";
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_ssl_server_name on;
    }

    # Proxy for Yahoo Finance API
    location /api/yahoo/ {
        proxy_pass https://query1.finance.yahoo.com/;
        proxy_set_header Host query1.finance.yahoo.com;
        proxy_set_header User-Agent "Mozilla/5.0";
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_ssl_server_name on;
    }
}
